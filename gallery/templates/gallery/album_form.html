{% extends 'gallery/base.html' %}
{% block content %}
<h1>{% if object %}Edit Album{% else %}Create Album{% endif %}</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn">Save</button>
    <a href="{% if object %}{% url 'gallery:album_detail' object.pk %}{% else %}{% url 'gallery:album_list' %}{% endif %}" class="btn btn-danger">Cancel</a>
</form>
{% endblock %}
